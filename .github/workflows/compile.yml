name: CI
on:
  push:
    branches:
      - '*'
    tags:
      - v*
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:v1.0
    steps:

      - name: Dependencies
        run: |
          apk add make git zip python3 py3-pip py3-yaml

      - uses: actions/checkout@v4
      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Clear bin directory
        run: |
          rm -rf bin/

      - name: Compile generic
        run: |
          make clean all

      - name: Upload artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: PROVERB
          path: |
            bin/proverb.elf

      - run: python3 generate_gamepack.py

      - name: pack rel
        run: |
          rm -f proverb.zip
          zip -r proverb.zip bin/* README.md LICENSE CHANGELOG

      - name: setup versioning in ENV
        id: meta
        run: |
          VERSION="$(make progver)"
          SHORT_SHA="${GITHUB_SHA::7}"
          TS="$(date -u +'%Y%m%d-%H%M%S')"
          echo "PROGVER=${VERSION}" >> "$GITHUB_ENV"
          echo "SHA=${SHORT_SHA}" >> "$GITHUB_ENV"

      - uses: "marvinpinto/action-automatic-releases@latest"
        if: github.ref == 'refs/heads/main'
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "nightly"
          prerelease: true
          title: "Nightly build of ${{ env.PROGVER }}"
          files: |
            bin/proverb.elf
            proverb.zip

      - name: Create GitHub tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: ${{ env.PROGVER }}
          name: "Proverb ${{ env.PROGVER }}"
          prerelease: false
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          body: |
            ![](https://img.shields.io/github/downloads/PS2Homebrew-arcade/proverb/${{ env.PROGVER }}/total?style=for-the-badge&logo=github&label=Downloads&labelColor=black)
          files: |
            bin/proverb.elf
            proverb.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}